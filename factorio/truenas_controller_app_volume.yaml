# TrueNAS Custom App - Factorio RCON Controller (volume-based, no registry)
#
# Use this only if you cannot build/push an image (Path B in CONTROLLER_DEPLOY.md).
# PREREQUISITE: Copy factorio_http_controller.py, config.py, requirements.txt to
# /mnt/boot-pool/apps/factorio-controller/ on the NAS first. See CONTROLLER_ON_NAS.md.
#
# 1. Create dir and copy files (see CONTROLLER_ON_NAS.md)
# 2. Apps → Discover Apps → ⋮ → Install via YAML; Application Name: controller
# 3. Paste this YAML, set RCON_PASSWORD, Deploy

version: "3.8"

services:
  controller:
    image: python:3.12-slim
    container_name: factorio-controller
    restart: unless-stopped
    network_mode: host
    environment:
      - RCON_HOST=192.168.0.158
      - RCON_PORT=27015
      - RCON_PASSWORD=Sahb5aevu3neiph
      - OLLAMA_MODEL=phi3:mini
      - OLLAMA_HOST=192.168.0.30
      - OLLAMA_PORT=11434
    working_dir: /app
    volumes:
      - /mnt/boot-pool/apps/factorio-controller:/app
      - /mnt/boot-pool/apps/factorio-controller/logs:/app/logs
    command: >
      sh -c "
        pip install --no-cache-dir -r requirements.txt &&
        exec python3 -u factorio_http_controller.py
      "
