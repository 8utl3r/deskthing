version: '3.8'

services:
  factorio-controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    container_name: factorio-n8n-controller
    restart: unless-stopped
    network_mode: host  # Use host network to access localhost services and reach Mac
    environment:
      - RCON_HOST=192.168.0.158
      - RCON_PORT=27015
      - RCON_PASSWORD=${RCON_PASSWORD:-Sahb5aevu3neiph}
      - OLLAMA_MODEL=phi3:mini
      - OLLAMA_HOST=192.168.0.30  # Mac IP where Ollama runs
      - OLLAMA_PORT=11434
    # Note: With host network, container can reach Mac at 192.168.0.30:11434 for Ollama
    # And n8n can reach this controller at localhost:8080
    volumes:
      - ./logs:/app/logs
    # Note: ports are not needed with network_mode: host
    # Note: If Ollama needs to run on NAS too, we can add it as a service here
    # For now, controller connects to Ollama on Mac at 192.168.0.30:11434
