configs:
  permissions_actions_data:
    content: >-
      [{"read_only": false, "mount_path":
      "/mnt/permission/postgres_postgres_data", "is_temporary": false,
      "identifier": "postgres_postgres_data", "recursive": false, "mode":
      "check", "uid": 999, "gid": 999, "chmod": null}, {"read_only": false,
      "mount_path": "/mnt/permission/redis_redis_data", "is_temporary": true,
      "identifier": "redis_redis_data", "recursive": true, "mode": "check",
      "uid": 568, "gid": 568, "chmod": null}, {"read_only": false, "mount_path":
      "/mnt/permission/tmp-n8n-npm-cache", "is_temporary": true, "identifier":
      "tmp-n8n-npm-cache", "recursive": true, "mode": "check", "uid": 568,
      "gid": 568, "chmod": null}]
services:
  n8n:
    cap_drop:
      - ALL
    depends_on:
      permissions:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4096M
    environment:
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_HOST: localhost
      DB_POSTGRESDB_PASSWORD: z3jeCStSchSHyw4t58CtuNdH3NBp9QlK
      DB_POSTGRESDB_PORT: '5432'
      DB_POSTGRESDB_USER: n8n
      DB_TYPE: postgresdb
      DEBUG: 'true'
      EXECUTIONS_MODE: regular
      GENERIC_TIMEZONE: America/Chicago
      GID: '568'
      GROUP_ID: '568'
      N8N_ENCRYPTION_KEY: ly9pb6mfetTK1bNTMv6iiXFNqe1SVWYZ8Wn5DW3XIQQ=
      N8N_HOST: 0.0.0.0
      N8N_PATH: /
      N8N_PORT: '30109'
      N8N_PROTOCOL: http
      N8N_RUNNERS_ENABLED: 'true'
      N8N_RUNNERS_MODE: internal
      N8N_SECURE_COOKIE: 'false'
      N8N_USER_FOLDER: /data
      NODE_ENV: production
      NVIDIA_VISIBLE_DEVICES: void
      PGID: '568'
      PUID: '568'
      QUEUE_BULL_REDIS_DB: '0'
      QUEUE_BULL_REDIS_HOST: localhost
      QUEUE_BULL_REDIS_PASSWORD: odaNLIkU5StQWzHiwmsZ5ND+eSWz4Mxm
      QUEUE_BULL_REDIS_PORT: '6379'
      QUEUE_BULL_REDIS_USERNAME: default
      TZ: America/Chicago
      UID: '568'
      UMASK: '002'
      UMASK_SET: '002'
      USER_ID: '568'
      npm_config_cache: /.cache/npm
    group_add:
      - 568
    healthcheck:
      interval: 30s
      retries: 5
      start_interval: 2s
      start_period: 15s
      test:
        - CMD
        - wget
        - '--quiet'
        - '--spider'
        - http://127.0.0.1:30109/healthz
      timeout: 5s
    image: ghcr.io/n8n-io/n8n:2.5.2
    platform: linux/amd64
    network_mode: host
    privileged: False
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    stdin_open: False
    tty: False
    user: '568:568'
    volumes:
      - read_only: False
        source: tmp-n8n-npm-cache
        target: /.cache
        type: volume
        volume:
          nocopy: False
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: False
        source: /mnt/tank/apps/n8n
        target: /data
        type: bind
      - read_only: False
        target: /tmp
        type: volume
        volume:
          nocopy: False
  permissions:
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
    cap_drop:
      - ALL
    configs:
      - mode: 320
        source: permissions_actions_data
        target: /script/actions.json
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
    entrypoint:
      - python3
      - /script/permissions.py
    environment:
      GID: '568'
      GROUP_ID: '568'
      NVIDIA_VISIBLE_DEVICES: void
      PGID: '568'
      PUID: '568'
      TZ: America/Chicago
      UID: '568'
      UMASK: '002'
      UMASK_SET: '002'
      USER_ID: '568'
    group_add:
      - 568
    healthcheck:
      disable: True
    image: ixsystems/container-utils:1.0.2
    network_mode: none
    platform: linux/amd64
    privileged: False
    restart: on-failure:1
    security_opt:
      - no-new-privileges=true
    stdin_open: False
    tty: False
    user: '0:0'
    volumes:
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: False
        source: /mnt/tank/apps/n8n-postgres
        target: /mnt/permission/postgres_postgres_data
        type: bind
      - read_only: False
        source: redis-data
        target: /mnt/permission/redis_redis_data
        type: volume
        volume:
          nocopy: False
      - read_only: False
        source: tmp-n8n-npm-cache
        target: /mnt/permission/tmp-n8n-npm-cache
        type: volume
        volume:
          nocopy: False
  postgres:
    cap_drop:
      - ALL
    depends_on:
      permissions:
        condition: service_completed_successfully
      postgres_upgrade:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4096M
    environment:
      GID: '568'
      GROUP_ID: '568'
      NVIDIA_VISIBLE_DEVICES: void
      PGDATA: /var/lib/postgresql/18/docker
      PGID: '568'
      PGPORT: '5432'
      POSTGRES_DB: n8n
      POSTGRES_PASSWORD: z3jeCStSchSHyw4t58CtuNdH3NBp9QlK
      POSTGRES_USER: n8n
      PUID: '568'
      TZ: America/Chicago
      UID: '568'
      UMASK: '002'
      UMASK_SET: '002'
      USER_ID: '568'
    group_add:
      - 568
    healthcheck:
      interval: 30s
      retries: 5
      start_interval: 2s
      start_period: 15s
      test:
        - CMD
        - pg_isready
        - '-h'
        - 127.0.0.1
        - '-p'
        - '5432'
        - '-U'
        - n8n
        - '-d'
        - n8n
      timeout: 5s
    image: postgres:18.1-trixie
    platform: linux/amd64
    ports:
      - mode: ingress
        protocol: tcp
        published: 5432
        target: 5432
    privileged: False
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    shm_size: 256M
    stdin_open: False
    stop_grace_period: 60s
    tty: False
    user: '999:999'
    volumes:
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: False
        source: /mnt/tank/apps/n8n-postgres
        target: /var/lib/postgresql
        type: bind
  postgres_upgrade:
    cap_drop:
      - ALL
    depends_on:
      permissions:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
    entrypoint:
      - /bin/bash
      - '-c'
      - /upgrade.sh
    environment:
      GID: '568'
      GROUP_ID: '568'
      NVIDIA_VISIBLE_DEVICES: void
      PGDATA: /var/lib/postgresql/18/docker
      PGID: '568'
      PGPORT: '5432'
      POSTGRES_DB: n8n
      POSTGRES_PASSWORD: z3jeCStSchSHyw4t58CtuNdH3NBp9QlK
      POSTGRES_USER: n8n
      PUID: '568'
      TARGET_VERSION: '18'
      TZ: America/Chicago
      UID: '568'
      UMASK: '002'
      UMASK_SET: '002'
      USER_ID: '568'
    group_add:
      - 568
    healthcheck:
      disable: True
    image: ixsystems/postgres-upgrade:1.1.7
    network_mode: none
    platform: linux/amd64
    privileged: False
    restart: on-failure:1
    security_opt:
      - no-new-privileges=true
    stdin_open: False
    tty: False
    user: '999:999'
    volumes:
      - bind:
          create_host_path: False
          propagation: rprivate
        read_only: False
        source: /mnt/tank/apps/n8n-postgres
        target: /var/lib/postgresql
        type: bind
  redis:
    cap_drop:
      - ALL
    command:
      - '--port'
      - '6379'
      - '--requirepass'
      - odaNLIkU5StQWzHiwmsZ5ND+eSWz4Mxm
    depends_on:
      permissions:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4096M
    environment:
      GID: '568'
      GROUP_ID: '568'
      NVIDIA_VISIBLE_DEVICES: void
      PGID: '568'
      PUID: '568'
      REDIS_PASSWORD: odaNLIkU5StQWzHiwmsZ5ND+eSWz4Mxm
      TZ: America/Chicago
      UID: '568'
      UMASK: '002'
      UMASK_SET: '002'
      USER_ID: '568'
    group_add:
      - 568
    healthcheck:
      interval: 30s
      retries: 5
      start_interval: 2s
      start_period: 15s
      test:
        - CMD
        - redis-cli
        - '-h'
        - 127.0.0.1
        - '-p'
        - '6379'
        - '-a'
        - odaNLIkU5StQWzHiwmsZ5ND+eSWz4Mxm
        - ping
      timeout: 5s
    image: valkey/valkey:9.0.1
    platform: linux/amd64
    ports:
      - mode: ingress
        protocol: tcp
        published: 6379
        target: 6379
    privileged: False
    restart: unless-stopped
    security_opt:
      - no-new-privileges=true
    stdin_open: False
    stop_grace_period: 60s
    tty: False
    user: '568:568'
    volumes:
      - read_only: False
        source: redis-data
        target: /data
        type: volume
        volume:
          nocopy: False
volumes:
  redis-data: {}
  tmp-n8n-npm-cache: {}
