# TrueNAS Custom App - Docker Compose YAML for Factorio
# 
# Installation Instructions:
# 1. Go to TrueNAS Web UI → Apps → Discover Apps
# 2. Click the three-dot menu (⋮) in top right
# 3. Select "Install via YAML"
# 4. Application Name: factorio
# 5. Paste this entire YAML file
# 6. Update FACTORIO_RCON_PASSWORD with your secure password
# 7. The volume path is set to /mnt/boot-pool/apps/factorio (NVMe for best performance)
#    Create the directory first: sudo mkdir -p /mnt/boot-pool/apps/factorio
#    Set permissions: sudo chown -R apps:apps /mnt/boot-pool/apps/factorio
# 8. Deploy

version: "3.8"

services:
  factorio:
    image: goofball222/factorio:latest
    # Alternative options for latest version:
    # 1. factoriotools/factorio:latest (more maintained, see truenas_custom_app_factoriotools.yaml)
    # 2. Build custom image (always latest, see build_and_deploy_guide.md)
    # Current server version: 2.0.72 (from logs)
    # Latest Factorio: 2.0.73 (may not be in Docker image yet)
    # See version_update_options.md for all update options
    container_name: factorio
    restart: unless-stopped
    ports:
      - "27015:27015/tcp"    # RCON
      - "34197:34197/udp"    # Game
    environment:
      - FACTORIO_RCON_PASSWORD=CHANGE_THIS_PASSWORD
      - FACTORIO_SAVE=my-save  # Optional: name of save file (without .zip)
    volumes:
      - /mnt/boot-pool/apps/factorio:/factorio
    mem_limit: 2g
    mem_reservation: 512m  # Reserve 512MB minimum
    cpus: '2'              # Limit to 2 CPU cores (leaves 2 for TrueNAS)
    # Note: TrueNAS Custom App may need resource limits set in Web UI instead
