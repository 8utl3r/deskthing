# Hammerflow Configuration
# Leader key system for Hammerspoon

# Settings
leader_key = "f18"        # Leader key (recommend remapping Right Command to f18 in Karabiner)
auto_reload = true        # Reload when config files change
show_ui = true            # Show UI with key maps
key_maps_per_line = 3     # Number of key maps per line in UI

# App launchers
t = "WezTerm"
c = "Cursor"
b = "Mullvad Browser"
f = "Finder"

# Hammerspoon config management
[h]
label = "[hammerspoon]"
c = "code: ~/.hammerspoon"
r = "reload"

# Window management
[w]
label = "[window]"
h = "window:left-half"
c = "window:center-half"
r = "window:right-half"
t = "window:top-half"
b = "window:bottom-half"

# LG Monitor control
[l]
label = "[lg-monitor]"
m = ["cmd: /bin/bash -c 'echo \"$(date): Running lg-monitor\" >> /tmp/hammerflow.log && ~/dotfiles/scripts/lg-c5/lg-monitor 2>&1 >> /tmp/hammerflow.log'", "monitor control"]
c = ["cmd: /bin/bash -c 'echo \"$(date): Running lg-monitor-connection\" >> /tmp/hammerflow.log && ~/dotfiles/scripts/lg-c5/lg-monitor-connection 2>&1 >> /tmp/hammerflow.log'", "connection status"]
d = ["cmd: /bin/bash -c 'echo \"$(date): Running dock-detector\" >> /tmp/hammerflow.log && ~/dotfiles/scripts/lg-c5/dock-detector 2>&1 >> /tmp/hammerflow.log'", "dock detector"]

# Home Assistant control
[a]
label = "[home-assistant]"
t = ["cmd: /bin/bash -c 'echo \"$(date): Running ha-test-integration\" >> /tmp/hammerflow.log && ~/dotfiles/scripts/home-assistant/ha-test-integration 2>&1 >> /tmp/hammerflow.log'", "test integration"]
v = ["cmd: /bin/bash -c 'echo \"$(date): Running ha-tv-volume\" >> /tmp/hammerflow.log && ~/dotfiles/scripts/home-assistant/ha-tv-volume 2>&1 >> /tmp/hammerflow.log'", "TV volume"]
w = ["cmd: /bin/bash -c 'echo \"$(date): Running ha-tv-wol\" >> /tmp/hammerflow.log && ~/dotfiles/scripts/home-assistant/ha-tv-wol 2>&1 >> /tmp/hammerflow.log'", "TV wake-on-LAN"]
s = ["cmd: /bin/bash -c 'echo \"$(date): Running ha-sync\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/home-assistant/ha-sync 2>&1 >> /tmp/hammerflow.log'", "sync config"]
p = ["cmd: /bin/bash -c 'echo \"$(date): Running ha-pull\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/home-assistant/ha-pull 2>&1 >> /tmp/hammerflow.log'", "pull config"]

# System utilities
[y]
label = "[system]"
l = ["cmd: /bin/bash -c 'echo \"$(date): Running link --apply\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/system/link --apply 2>&1 >> /tmp/hammerflow.log'", "link dotfiles"]
b = ["cmd: /bin/bash -c 'echo \"$(date): Running bootstrap\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/system/bootstrap 2>&1 >> /tmp/hammerflow.log'", "bootstrap system"]
n = ["cmd: /bin/bash -c 'echo \"$(date): Running snapshot\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/system/snapshot 2>&1 >> /tmp/hammerflow.log'", "snapshot system"]
u = ["cmd: /bin/bash -c 'echo \"$(date): Running update\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/system/update 2>&1 >> /tmp/hammerflow.log'", "update system"]

# Quick actions
[p]
label = "[prefixes]"
r = "reload"              # Reload Hammerspoon config
