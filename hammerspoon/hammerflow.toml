# Hammerflow Configuration
# Leader key system for Hammerspoon

# Settings
leader_key = "f18"        # Leader key (recommend remapping Right Command to f18 in Karabiner)
auto_reload = true        # Reload when config files change
show_ui = true            # Show UI with key maps
key_maps_per_line = 2     # Number of key maps per line in UI (reduced to allow longer descriptions)

# App launchers
t = "WezTerm"
c = "Cursor"
b = "Mullvad Browser"
f = "Finder"

# Hammerspoon config management
[h]
label = "[hammerspoon]"
c = "code: ~/.hammerspoon"
r = "reload"

# Window management
[w]
label = "[window]"
h = "window:left-half"
c = "window:center-half"
r = "window:right-half"
t = "window:top-half"
b = "window:bottom-half"

# Status Dashboard (shows when leader key is pressed)
s = "function:showDashboard"  # Show status dashboard

# LG Monitor control
[l]
label = "[lg-monitor]"
p = ["function:sendLGCommand|power_on", "LG: Power On"]
o = ["function:sendLGCommand|power_off", "LG: Power Off"]
u = ["function:sendLGCommand|volume_up", "LG: Volume Up"]
d = ["function:sendLGCommand|volume_down", "LG: Volume Down"]
m = ["function:sendLGCommand|mute", "LG: Mute Toggle"]
[l.i]
label = "[lg-inputs]"
1 = ["function:sendLGCommand|input_hdmi1", "LG: Switch to HDMI 1"]
2 = ["function:sendLGCommand|input_hdmi2", "LG: Switch to HDMI 2"]
3 = ["function:sendLGCommand|input_hdmi3", "LG: Switch to HDMI 3"]
4 = ["function:sendLGCommand|input_hdmi4", "LG: Switch to HDMI 4"]

# Home Assistant control
[a]
label = "[home-assistant]"
t = ["cmd: /bin/bash -c 'echo \"$(date): Running ha-test-integration\" >> /tmp/hammerflow.log && ~/dotfiles/scripts/home-assistant/ha-test-integration 2>&1 >> /tmp/hammerflow.log'", "HA: Test TV integration & API"]
p = ["hs:local ha = require('modules.home-assistant'); ha.toggleTV()", "HA: Toggle TV Power"]
v = ["cmd: /bin/bash -c '~/dotfiles/scripts/home-assistant/ha-tv-volume 1'", "HA: Set TV volume to 1%"]
w = ["cmd: /bin/bash -c '~/dotfiles/scripts/home-assistant/ha-tv-volume 5'", "HA: Set TV volume to 5%"]
e = ["cmd: /bin/bash -c '~/dotfiles/scripts/home-assistant/ha-tv-volume 25'", "HA: Set TV volume to 25%"]
r = ["cmd: /bin/bash -c '~/dotfiles/scripts/home-assistant/ha-tv-volume 50'", "HA: Set TV volume to 50%"]
[a.v]
label = "[ha-volume]"
u = ["hs:local ha = require('modules.home-assistant'); local tv = ha.getTVState('lg_webos_tv_oled42c5pua'); if tv and tv.attributes.volume_level then local vol = math.min(100, math.floor(tv.attributes.volume_level * 100) + 1); ha.setTVVolume('lg_webos_tv_oled42c5pua', vol); end", "HA: Volume Up (+1%)"]
d = ["hs:local ha = require('modules.home-assistant'); local tv = ha.getTVState('lg_webos_tv_oled42c5pua'); if tv and tv.attributes.volume_level then local vol = math.max(0, math.floor(tv.attributes.volume_level * 100) - 1); ha.setTVVolume('lg_webos_tv_oled42c5pua', vol); end", "HA: Volume Down (-1%)"]
[a.i]
label = "[ha-inputs]"
1 = ["hs:local ha = require('modules.home-assistant'); ha.switchToHDMI1()", "HA: Switch to HDMI 1"]
2 = ["hs:local ha = require('modules.home-assistant'); ha.switchToHDMI2()", "HA: Switch to HDMI 2"]
3 = ["hs:local ha = require('modules.home-assistant'); ha.sendButton('lg_webos_tv_oled42c5pua', 'HOME'); hs.timer.doAfter(0.5, function() ha.sendButton('lg_webos_tv_oled42c5pua', 'DOWN'); hs.timer.doAfter(0.3, function() ha.sendButton('lg_webos_tv_oled42c5pua', 'DOWN'); hs.timer.doAfter(0.3, function() ha.sendButton('lg_webos_tv_oled42c5pua', 'DOWN'); hs.timer.doAfter(0.3, function() ha.sendButton('lg_webos_tv_oled42c5pua', 'ENTER'); end); end); end); end)", "HA: Switch to HDMI 3"]
4 = ["hs:local ha = require('modules.home-assistant'); ha.sendButton('lg_webos_tv_oled42c5pua', 'HOME'); hs.timer.doAfter(0.5, function() ha.sendButton('lg_webos_tv_oled42c5pua', 'DOWN'); hs.timer.doAfter(0.3, function() ha.sendButton('lg_webos_tv_oled42c5pua', 'DOWN'); hs.timer.doAfter(0.3, function() ha.sendButton('lg_webos_tv_oled42c5pua', 'DOWN'); hs.timer.doAfter(0.3, function() ha.sendButton('lg_webos_tv_oled42c5pua', 'DOWN'); hs.timer.doAfter(0.3, function() ha.sendButton('lg_webos_tv_oled42c5pua', 'ENTER'); end); end); end); end); end)", "HA: Switch to HDMI 4"]
h = ["hs:local ha = require('modules.home-assistant'); ha.goHome()", "HA: Go to Home screen"]
b = ["hs:local ha = require('modules.home-assistant'); ha.goBack()", "HA: Go Back"]
[a.c]
label = "[ha-config]"
s = ["cmd: /bin/bash -c 'echo \"$(date): Running ha-sync\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/home-assistant/ha-sync 2>&1 >> /tmp/hammerflow.log'", "HA: Sync config to remote"]
p = ["cmd: /bin/bash -c 'echo \"$(date): Running ha-pull\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/home-assistant/ha-pull 2>&1 >> /tmp/hammerflow.log'", "HA: Pull config from remote"]
w = ["cmd: /bin/bash -c 'echo \"$(date): Running ha-tv-wol\" >> /tmp/hammerflow.log && ~/dotfiles/scripts/home-assistant/ha-tv-wol 2>&1 >> /tmp/hammerflow.log'", "HA: Wake TV via Wake-on-LAN"]

# System utilities
[y]
label = "[system]"
l = ["cmd: /bin/bash -c 'echo \"$(date): Running link --apply\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/system/link --apply 2>&1 >> /tmp/hammerflow.log'", "Dotfiles: Apply symlinks"]
b = ["cmd: /bin/bash -c 'echo \"$(date): Running bootstrap\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/system/bootstrap 2>&1 >> /tmp/hammerflow.log'", "Dotfiles: Bootstrap system setup"]
n = ["cmd: /bin/bash -c 'echo \"$(date): Running snapshot\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/system/snapshot 2>&1 >> /tmp/hammerflow.log'", "Dotfiles: Create system snapshot"]
u = ["cmd: /bin/bash -c 'echo \"$(date): Running update\" >> /tmp/hammerflow.log && cd ~/dotfiles && ./scripts/system/update 2>&1 >> /tmp/hammerflow.log'", "Dotfiles: Update packages & configs"]

# Quick actions
[p]
label = "[prefixes]"
r = "reload"              # Reload Hammerspoon config
