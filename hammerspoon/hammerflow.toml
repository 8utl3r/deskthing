# Hammerflow Configuration
# Leader key system for Hammerspoon

# Settings
leader_key = "f18"        # Leader key (recommend remapping Right Command to f18 in Karabiner)
auto_reload = true        # Reload when config files change
show_ui = true            # Show UI with key maps
key_maps_per_line = 3     # Number of key maps per line in UI

# App launchers
t = "WezTerm"
c = "Cursor"
b = "Mullvad Browser"
f = "Finder"

# Hammerspoon config management
[h]
label = "[hammerspoon]"
c = "code: ~/.hammerspoon"
r = "reload"

# Window management
[w]
label = "[window]"
h = "window:left-half"
c = "window:center-half"
r = "window:right-half"
t = "window:top-half"
b = "window:bottom-half"

# LG Monitor control
[l]
label = "[lg-monitor]"
m = ["cmd: ~/dotfiles/scripts/lg-c5/lg-monitor", "monitor control"]
c = ["cmd: ~/dotfiles/scripts/lg-c5/lg-monitor-connection", "connection status"]
d = ["cmd: ~/dotfiles/scripts/lg-c5/dock-detector", "dock detector"]

# Home Assistant control
[ha]
label = "[home-assistant]"
t = ["cmd: ~/dotfiles/scripts/home-assistant/ha-test-integration", "test integration"]
v = ["cmd: ~/dotfiles/scripts/home-assistant/ha-tv-volume", "TV volume"]
w = ["cmd: ~/dotfiles/scripts/home-assistant/ha-tv-wol", "TV wake-on-LAN"]
s = ["cmd: cd ~/dotfiles && ./scripts/home-assistant/ha-sync", "sync config"]
p = ["cmd: cd ~/dotfiles && ./scripts/home-assistant/ha-pull", "pull config"]

# System utilities
[s]
label = "[system]"
l = ["cmd: cd ~/dotfiles && ./scripts/system/link --apply", "link dotfiles"]
b = ["cmd: cd ~/dotfiles && ./scripts/system/bootstrap", "bootstrap system"]
n = ["cmd: cd ~/dotfiles && ./scripts/system/snapshot", "snapshot system"]
u = ["cmd: cd ~/dotfiles && ./scripts/system/update", "update system"]

# Quick actions
[p]
label = "[prefixes]"
r = "reload"              # Reload Hammerspoon config
