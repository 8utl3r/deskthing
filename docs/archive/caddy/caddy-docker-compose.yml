version: '3.8'

services:
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /mnt/tank/apps/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /mnt/tank/apps/caddy/data:/data
      - /mnt/tank/apps/caddy/config:/config
    networks:
      - default
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    name: caddy-network
    driver: bridge
