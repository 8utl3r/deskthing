  alias: "LG C5 Input HDMI 3"
  description: "Switch LG C5 to HDMI 3"
  sequence:
    - service: media_player.select_source
      target:
        entity_id: media_player.lg_c5_monitor
      data:
        source: "HDMI 3"
    - service: input_select.select_option
      target:
