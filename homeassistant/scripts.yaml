# Home Assistant Scripts for macOS Dotfiles
# Reusable automation scripts for LG C5 monitor control

# LG C5 Monitor Control Scripts
lg_c5_power_toggle:
  alias: "LG C5 Power Toggle"
  description: "Toggle LG C5 monitor power on/off"
  sequence:
    - if:
        - condition: state
          entity_id: media_player.lg_c5_monitor
          state: "off"
      then:
        - service: wake_on_lan.send_magic_packet
          data:
            mac: "58:96:0a:c3:1g:5b"
        - service: notify.macos_notifications
          data:
            title: "LG C5 Monitor"
            message: "Powering on monitor"
      else:
        - service: media_player.turn_off
          target:
            entity_id: media_player.lg_c5_monitor
        - service: notify.macos_notifications
          data:
            title: "LG C5 Monitor"
            message: "Powering off monitor"

lg_c5_volume_up:
  alias: "LG C5 Volume Up"
  description: "Increase LG C5 monitor volume"
  sequence:
    - service: media_player.volume_up
      target:
        entity_id: media_player.lg_c5_monitor
    - service: notify.macos_notifications
      data:
        title: "LG C5 Monitor"
        message: "Volume increased"

lg_c5_volume_down:
  alias: "LG C5 Volume Down"
  description: "Decrease LG C5 monitor volume"
  sequence:
    - service: media_player.volume_down
      target:
        entity_id: media_player.lg_c5_monitor
    - service: notify.macos_notifications
      data:
        title: "LG C5 Monitor"
        message: "Volume decreased"

lg_c5_mute_toggle:
  alias: "LG C5 Mute Toggle"
  description: "Toggle LG C5 monitor mute"
  sequence:
    - service: media_player.volume_mute
      target:
        entity_id: media_player.lg_c5_monitor
      data:
        is_volume_muted: "{{ not is_state_attr('media_player.lg_c5_monitor', 'is_volume_muted', true) }}"
    - service: notify.macos_notifications
      data:
        title: "LG C5 Monitor"
        message: "Mute toggled"

lg_c5_input_hdmi1:
  alias: "LG C5 Input HDMI 1"
  description: "Switch LG C5 to HDMI 1"
  sequence:
    - service: media_player.select_source
      target:
        entity_id: media_player.lg_c5_monitor
      data:
        source: "HDMI 1"
    - service: input_select.select_option
      target:
        entity_id: input_select.lg_c5_input
      data:
        option: "HDMI 1"

lg_c5_input_hdmi2:
  alias: "LG C5 Input HDMI 2"
  description: "Switch LG C5 to HDMI 2"
