# macOS Integration Scripts
mac_dock_status_check:
  alias: "Mac Dock Status Check"
  description: "Check and update Mac dock status"
  sequence:
    - service: shell_command.check_dock_status
    - service: notify.macos_notifications
      data:
        title: "Dock Status"
        message: "Dock status updated"

mac_sleep_status_check:
  alias: "Mac Sleep Status Check"
  description: "Check and update Mac sleep status"
  sequence:
    - service: shell_command.check_sleep_status
    - service: notify.macos_notifications
      data:
        title: "Sleep Status"
        message: "Sleep status updated"
